name: tiktok-refresh-cron-next

on:
  schedule:
    - cron: "*/20 * * * *" # every 20 minutes
  workflow_dispatch: {}

jobs:
  call-tiktok-refresh-next:
    runs-on: ubuntu-latest
    steps:
      - name: Call Next.js TikTok Refresh Endpoint
        shell: bash
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [[ -z "${APP_URL:-}" || -z "${CRON_SECRET:-}" ]]; then
            echo "APP_URL and/or CRON_SECRET secrets are missing" >&2
            exit 1
          fi
          curl -sS -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL%/}/api/cron/sync-tiktok?limit=50&concurrency=3" \
            | sed -e 's/\r//g' -e 's/.*/::notice::&/'
