name: instagram-refresh-cron

on:
  schedule:
    - cron: "0 */2 * * *" # every 2 hours
  workflow_dispatch: {}

jobs:
  call-instagram-refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Call Next.js Instagram Refresh Endpoint
        shell: bash
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [[ -z "${APP_URL:-}" || -z "${CRON_SECRET:-}" ]]; then
            echo "APP_URL and/or CRON_SECRET secrets are missing" >&2
            exit 1
          fi
          curl -sS -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL%/}/api/cron/instagram-refresh?limit=200&concurrency=6" \
            | sed -e 's/\r//g' -e 's/.*/::notice::&/'
